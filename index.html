    <style>
        #protect-toast {
            display: none;
            position: fixed;
            top: 20px;
            left: 50%;

            background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%);

        }
        @keyframes fadeInDown {
            from { opacity: 0; transform: translateX(-50%) translateY(-15px); }
            to   { opacity: 1; transform: translateX(-50%) translateY(0); }
        }
        #protect-overlay {
            display: none;
            position: fixed;
            inset: 0;

        }

        #protect-overlay .box {
            background: #1e293b;
            border: 1px solid #f39c12;
            border-radius: 20px;
            padding: 40px 50px;

        }

        #protect-overlay h2 { color: #f39c12; font-size: 1.3rem; margin-bottom: 8px; }

    </style>

    <div id="protect-toast">🔒 Web Ini Dilindungi — Aksi Diblokir</div>
    <div id="protect-overlay">
        <div class="box">
            <div class="icon">🛡️</div>
            <h2>Web Ini Dilindungi</h2>
            <p>Inspect Element & Developer Tools tidak diperbolehkan di halaman ini.</p>
        </div>
    </div>

    <script>
        (function() {
            function showToast() {
                const t = document.getElementById('protect-toast');
                if (!t) return;
                t.style.display = 'block';
                setTimeout(() => { t.style.display = 'none'; }, 3000);
            }
            document.addEventListener('contextmenu', function(e) {
                e.preventDefault();
                showToast();
            });
            document.addEventListener('keydown', function(e) {
                if (e.key === 'F12') { e.preventDefault(); showToast(); return; }
                if ((e.ctrlKey || e.metaKey) && e.shiftKey && (e.key === 'I' || e.key === 'i')) { e.preventDefault(); showToast(); return; }
                if ((e.ctrlKey || e.metaKey) && e.shiftKey && (e.key === 'J' || e.key === 'j')) { e.preventDefault(); showToast(); return; }
                if ((e.ctrlKey || e.metaKey) && e.shiftKey && (e.key === 'C' || e.key === 'c')) { e.preventDefault(); showToast(); return; }
                if ((e.ctrlKey || e.metaKey) && (e.key === 'U' || e.key === 'u')) { e.preventDefault(); showToast(); return; }
                if ((e.ctrlKey || e.metaKey) && (e.key === 'S' || e.key === 's')) { e.preventDefault(); showToast(); return; }
            });
            var devtoolsOpen = false;
            function checkDevTools() {
                var overlay = document.getElementById('protect-overlay');
                if (!overlay) return;
                var widthThreshold = window.outerWidth - window.innerWidth > 160;
                var heightThreshold = window.outerHeight - window.innerHeight > 160;
                if (widthThreshold || heightThreshold) {
                    if (!devtoolsOpen) {
                        devtoolsOpen = true;
                        overlay.classList.add('show');
                    }
                } else {
                    if (devtoolsOpen) {
                        devtoolsOpen = false;
                        overlay.classList.remove('show');
                    }
                }
            }
            document.addEventListener('DOMContentLoaded', function() {
                setInterval(checkDevTools, 1000);
            });
            document.addEventListener('selectstart', function(e) {
                if (e.target.tagName !== 'INPUT' && e.target.tagName !== 'TEXTAREA' && e.target.tagName !== 'SELECT') {
                    e.preventDefault();
                }
            });
        })();
        
        function toggleManual(sel) {
            const wrap = document.getElementById("persenManualWrap");
            const inp  = document.getElementById("persen_manual");
            if (sel.value === "manual") {
                wrap.style.display = "block";
                inp.focus();
            } else {
                wrap.style.display = "none";
                inp.value = "";
            }
        }
    </script>

    <style>
        * { 
            box-sizing: border-box; 
            margin: 0;
            padding: 0;
        }
        
        :root {
            --primary: #7c3aed;
            --primary-light: #a78bfa;
            --primary-dark: #6d28d9;
            --accent: #ec4899;
            --accent-light: #f472b6;

            --warning: #f59e0b;
            --bg-dark: #0f172a;
            --bg-darker: #020617;
            --card: #ffffff;
            --text: #0f172a;
            --text-light: #64748b;
            --border: #e2e8f0;

        }

        html, body {
            height: 100%;
            width: 100%;
            margin: 0;
            padding: 0;
            scroll-behavior: smooth;
            overflow-x: hidden;
        }

        body {
            background: var(--gradient-dark);
            color: var(--text);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            padding: 30px 15px;
            min-height: 100vh;
            position: relative;
        }

        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: 
                radial-gradient(circle at 20% 50%, rgba(124, 58, 237, 0.08) 0%, transparent 50%),
                radial-gradient(circle at 80% 80%, rgba(236, 72, 153, 0.08) 0%, transparent 50%);
            pointer-events: none;
            z-index: 0;
        }

        .container-custom {
            max-width: 1200px;
            margin: 0 auto;
            position: relative;
            z-index: 1;
            width: 100%;
        }

        .card-premium {
            background: rgba(255, 255, 255, 0.97);
            backdrop-filter: blur(20px);
            border-radius: 32px;
            box-shadow: 
                0 30px 90px rgba(0, 0, 0, 0.2),
                0 0 1px rgba(255, 255, 255, 0.3) inset;
            padding: 45px;
            border: 1px solid rgba(255, 255, 255, 0.25);
            position: relative;
            overflow: hidden;
            animation: slideUp 0.8s ease-out;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(40px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .card-premium::before {
            content: '';
            position: absolute;
            top: -50%;
            right: -50%;
            width: 350px;
            height: 350px;
            background: var(--gradient-primary);
            border-radius: 50%;
            opacity: 0.06;
            animation: float 8s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0px) translateX(0px); }
            50% { transform: translateY(-30px) translateX(-20px); }
        }

        .card-premium::after {
            content: '';
            position: absolute;
            bottom: -50%;
            left: -50%;
            width: 350px;
            height: 350px;
            background: var(--gradient-primary);
            border-radius: 50%;
            opacity: 0.06;
            animation: float 10s ease-in-out infinite reverse;
        }

        .card-premium > * {
            position: relative;
            z-index: 2;
        }

        .header-section {
            text-align: center;
            margin-bottom: 40px;
            padding-bottom: 25px;
            border-bottom: 2px solid var(--border);
        }

        .header-section h4 {
            background: var(--gradient-primary);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            font-size: 2.1rem;
            font-weight: 900;
            letter-spacing: -1px;
            margin-bottom: 10px;
        }

        .header-section .subtitle {
            color: var(--text-light);
            font-size: 1rem;
            font-weight: 500;
            letter-spacing: 0.5px;
        }

            font-weight: 900;

            background: rgba(255, 255, 255, 0.8);

            cursor: pointer;
            border: 2.5px solid var(--border);

            transition: all 0.3s ease;

        }

            box-shadow: 0 0 0 3px rgba(124, 58, 237, 0.2);

            backdrop-filter: blur(10px);
        }

        .checkbox-group {

        .checkbox-item {
            display: flex;

        }

        .checkbox-item label {
            margin: 0;

            cursor: pointer;

        .btn-send {
            background: var(--gradient-primary);
            color: white;
            border: none;
            padding: 16px;
            border-radius: 14px;
            font-weight: 900;
            width: 100%;

            position: relative;
            overflow: hidden;
        }

        .btn-send::before {

            top: 50%;

            background: rgba(255, 255, 255, 0.25);
            border-radius: 50%;

        }

const ITEMS = ["Hardware", "Sistem Operasi", "Software", "Kondisi Fisik"];

window.onload = () => {
    const list = document.getElementById("dataKaryawan");
    Object.keys(DB).sort().forEach(n => {
        const opt = document.createElement("option");
        opt.value = n;
        list.appendChild(opt);
    });
    const pct = document.getElementById("persen");
    pct.add(new Option("Pilih...", ""));
    for (let i = 100; i >= 10; i -= 10) pct.add(new Option(i + "%", i));
    pct.add(new Option("✏️ Ketik Manual...", "manual"));
    
    const tbody = document.getElementById("auditRows");
    ITEMS.forEach(k => {
        const id = k.toLowerCase().replace(/ /g, "");
        tbody.innerHTML += `<tr>
            <td class="fw-bold">${k}</td>
            <td data-label="BAIK" class="text-center"><input class="form-check-input" type="radio" name="${id}" value="Baik" checked></td>
            <td data-label="KURANG" class="text-center"><input class="form-check-input" type="radio" name="${id}" value="Kurang"></td>
            <td data-label="RUSAK" class="text-center"><input class="form-check-input" type="radio" name="${id}" value="Rusak"></td>
        </tr>`;
    });
};

function handleAuto() {
    const raw = document.getElementById("nama").value.trim();
    const val = raw.toUpperCase();
    const d = DB[val] || DB[raw];
    if (d) {
        document.getElementById("jabatan").value = d.jbt;
        document.getElementById("spek").value = d.spek;
        document.getElementById("inventaris").value = INV_MAP[val] || INV_MAP[raw] || "";
        ["tas","mouse","keyboard","stylus"].forEach(a => {
            document.getElementById(`aks_${a}`).checked = d.aks.includes(a);
        });
    } else {
        document.getElementById("jabatan").value = "";
        document.getElementById("spek").value = "";
        document.getElementById("inventaris").value = "";
        ["tas","mouse","keyboard","stylus"].forEach(a => {
            document.getElementById(`aks_${a}`).checked = false;
        });
    }
}

async function save() {
    const rawVal = document.getElementById("nama").value.trim();
    if (!document.getElementById("periode").value) { 
        alert("⚠️ Pilih Periode Laporan dulu Bro!"); 
        return; 
    }
    const n = rawVal.toUpperCase();
    if (!DB[n]) { alert("⚠️ Nama tidak ditemukan!"); return; }
    if (!document.getElementById("pernyataan").checked) { alert("⚠️ Centang pernyataan dulu!"); return; }
    const isManual = document.getElementById("persen").value === "manual";
    const manualVal = document.getElementById("persen_manual").value;
    if (!document.getElementById("persen").value || (isManual && !manualVal)) {
        alert("⚠️ Pilih atau ketik persentase kelayakan!"); return;
    }

    const b = document.getElementById("btnSave");
    const inner = document.getElementById("btnSaveInner");
    b.disabled = true;
    inner.innerHTML = '<span class="btn-spinner"></span> SEDANG MENGIRIM...';

    const payload = {
        ts: new Date().toLocaleString("id-ID"),
        periode: document.getElementById("periode").value,
        nama: rawVal,
        jbt: document.getElementById("jabatan").value,
        unit: document.getElementById("spek").value,
        inv: document.getElementById("inventaris").value,
        hw: document.querySelector('input[name="hardware"]:checked').value,
        os: document.querySelector('input[name="sistemoperasi"]:checked').value,
        sw: document.querySelector('input[name="software"]:checked').value,
        fs: document.querySelector('input[name="kondisifisik"]:checked').value,
        aks: ["tas","mouse","keyboard","stylus"].filter(a => document.getElementById(`aks_${a}`).checked).join(", "),
        pct: (document.getElementById("persen").value === "manual" ? document.getElementById("persen_manual").value : document.getElementById("persen").value) + "%",
        ket: document.getElementById("ket_umum").value
    };

    try {
        await fetch("https://script.google.com/macros/s/AKfycbxGPBdoZFINPPFA6LJxvCXGFm57bQbAjHNX52B5MzzH_S99EGMUAgrJl74tFXdGO273/exec", {
            method: "POST", mode: "no-cors", body: JSON.stringify(payload)
        });
        alert("✅ Laporan Berhasil Dikirim!");
        location.reload();
    } catch(e) {
        alert("❌ Gagal Kirim!");
        b.disabled = false;
        inner.innerHTML = '✅ SIMPAN LAPORAN SEKARANG';
    }
}
</script>
