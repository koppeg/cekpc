    <style>

        }
        @keyframes fadeInDown {
            from { opacity: 0; transform: translateX(-50%) translateY(-15px); }
            to   { opacity: 1; transform: translateX(-50%) translateY(0); }
        }
        #protect-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.85);
            z-index: 99998;
            justify-content: center;
            align-items: center;
            flex-direction: column;
        }
        #protect-overlay.show { display: flex; }
        #protect-overlay .box {
            background: #1e293b;
            border: 1px solid #f39c12;
            border-radius: 20px;
            padding: 40px 50px;
            text-align: center;
            color: #fff;
            font-family: sans-serif;
            max-width: 360px;
        }
        #protect-overlay .icon { font-size: 48px; margin-bottom: 12px; }
        #protect-overlay h2 { color: #f39c12; font-size: 1.3rem; margin-bottom: 8px; }
        #protect-overlay p { color: #94a3b8; font-size: 0.9rem; margin: 0; }
    </style>

    <!-- Toast notifikasi -->
    <div id="protect-toast">🔒 Web Ini Dilindungi — Aksi Diblokir</div>

    <!-- Overlay peringatan penuh -->
    <div id="protect-overlay">
        <div class="box">
            <div class="icon">🛡️</div>
            <h2>Web Ini Dilindungi</h2>
            <p>Inspect Element & Developer Tools tidak diperbolehkan di halaman ini.</p>
        </div>
    </div>

    <script>
        (function() {
            // --- Tampilkan toast sementara ---
            function showToast() {
                const t = document.getElementById('protect-toast');
                if (!t) return;
                t.style.display = 'block';
                setTimeout(() => { t.style.display = 'none'; }, 3000);
            }

            // --- Block klik kanan ---
            document.addEventListener('contextmenu', function(e) {
                e.preventDefault();
                showToast();
            });

            // --- Block keyboard shortcut DevTools ---
            document.addEventListener('keydown', function(e) {
                // F12
                if (e.key === 'F12') { e.preventDefault(); showToast(); return; }
                // Ctrl+Shift+I / Cmd+Opt+I
                if ((e.ctrlKey || e.metaKey) && e.shiftKey && (e.key === 'I' || e.key === 'i')) { e.preventDefault(); showToast(); return; }
                // Ctrl+Shift+J / Cmd+Opt+J (console)
                if ((e.ctrlKey || e.metaKey) && e.shiftKey && (e.key === 'J' || e.key === 'j')) { e.preventDefault(); showToast(); return; }
                // Ctrl+Shift+C (element picker)
                if ((e.ctrlKey || e.metaKey) && e.shiftKey && (e.key === 'C' || e.key === 'c')) { e.preventDefault(); showToast(); return; }
                // Ctrl+U (view source)
                if ((e.ctrlKey || e.metaKey) && (e.key === 'U' || e.key === 'u')) { e.preventDefault(); showToast(); return; }
                // Ctrl+S (save page)
                if ((e.ctrlKey || e.metaKey) && (e.key === 'S' || e.key === 's')) { e.preventDefault(); showToast(); return; }
            });

            // --- Deteksi DevTools terbuka via ukuran window (desktop) ---
            var devtoolsOpen = false;
            function checkDevTools() {
                var overlay = document.getElementById('protect-overlay');
                if (!overlay) return;
                var widthThreshold = window.outerWidth - window.innerWidth > 160;
                var heightThreshold = window.outerHeight - window.innerHeight > 160;
                if (widthThreshold || heightThreshold) {
                    if (!devtoolsOpen) {
                        devtoolsOpen = true;
                        overlay.classList.add('show');
                    }
                } else {
                    if (devtoolsOpen) {
                        devtoolsOpen = false;
                        overlay.classList.remove('show');
                    }
                }
            }
            document.addEventListener('DOMContentLoaded', function() {
                setInterval(checkDevTools, 1000);
            });

            // --- Block select-all teks ---
            document.addEventListener('selectstart', function(e) {
                if (e.target.tagName !== 'INPUT' && e.target.tagName !== 'TEXTAREA' && e.target.tagName !== 'SELECT') {
                    e.preventDefault();
                }
            });
        })();
    </script>

          `;

      }
    </script>

};

const ITEMS = ["Hardware", "Sistem Operasi", "Software", "Kondisi Fisik"];

window.onload = () => {
    const list = document.getElementById("dataKaryawan");
    Object.keys(DB).sort().forEach(n => {
        const opt = document.createElement("option");
        opt.value = n;
        list.appendChild(opt);
    });
    const pct = document.getElementById("persen");
    pct.add(new Option("Pilih...", ""));
    for (let i = 100; i >= 10; i -= 10) pct.add(new Option(i + "%", i));
    
    const tbody = document.getElementById("auditRows");
    ITEMS.forEach(k => {
        const id = k.toLowerCase().replace(/ /g, "");
        tbody.innerHTML += `<tr>
            <td class="fw-bold">${k}</td>
            <td data-label="BAIK" class="text-center"><input class="form-check-input" type="radio" name="${id}" value="Baik" checked></td>
            <td data-label="KURANG" class="text-center"><input class="form-check-input" type="radio" name="${id}" value="Kurang"></td>
            <td data-label="RUSAK" class="text-center"><input class="form-check-input" type="radio" name="${id}" value="Rusak"></td>
        </tr>`;
    });
};

function handleAuto() {
    const raw = document.getElementById("nama").value.trim();
    const val = raw.toUpperCase();
    const d = DB[val] || DB[raw];
    if (d) {
        document.getElementById("jabatan").value = d.jbt;
        document.getElementById("spek").value = d.spek;
        ["tas","mouse","keyboard","stylus"].forEach(a => {
            document.getElementById(`aks_${a}`).checked = d.aks.includes(a);
        });
    } else {
        document.getElementById("jabatan").value = "";
        document.getElementById("spek").value = "";
        ["tas","mouse","keyboard","stylus"].forEach(a => {
            document.getElementById(`aks_${a}`).checked = false;
        });
    }
}

async function save() {
    const rawVal = document.getElementById("nama").value.trim();

    // 1. Validasi Periode
    if (!document.getElementById("periode").value) { 
        alert("⚠️ Pilih Periode Laporan dulu Bro!"); 
        return; 
    }

    // 2. Validasi Nama
    const n = rawVal.toUpperCase();
    if (!DB[n]) { alert("⚠️ Nama tidak ditemukan!"); return; }
    
    // 3. Validasi Checklist & Persentase
    if (!document.getElementById("pernyataan").checked) { alert("⚠️ Centang pernyataan dulu!"); return; }
    if (!document.getElementById("persen").value) { alert("⚠️ Pilih persentase kelayakan!"); return; }

    const b = document.getElementById("btnSave");
    b.disabled = true; b.innerText = "SEDANG MENGIRIM...";

    const payload = {
        ts: new Date().toLocaleString("id-ID"),
        periode: document.getElementById("periode").value,
        nama: rawVal,
        jbt: document.getElementById("jabatan").value,
        unit: document.getElementById("spek").value,
        hw: document.querySelector('input[name="hardware"]:checked').value,
        os: document.querySelector('input[name="sistemoperasi"]:checked').value,
        sw: document.querySelector('input[name="software"]:checked').value,
        fs: document.querySelector('input[name="kondisifisik"]:checked').value,
        aks: ["tas","mouse","keyboard","stylus"].filter(a => document.getElementById(`aks_${a}`).checked).join(", "),
        pct: document.getElementById("persen").value + "%",
        ket: document.getElementById("ket_umum").value
    };

    try {
        await fetch("https://script.google.com/macros/s/AKfycbxr25bP6ZZ33M1cpFGiq04CcEYY4WAfbINrq7-6yKKHLhuPXnG8NGcis4Lu30dGY4er/exec", {
            method: "POST", mode: "no-cors", body: JSON.stringify(payload)
        });
        alert("✅ Laporan Berhasil Dikirim!");
        location.reload();
    } catch(e) {
        alert("❌ Gagal Kirim!");
        b.disabled = false; b.innerText = "Simpan Laporan Sekarang ✅";
    }
}
</script>
